---
name: Node tests

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: npm-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package-readiness:
    name: Package readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run full test suite
        run: npm test

      - name: Build package
        run: npm run build

      - name: Check published tarball
        run: npm run pack:check

  test-node-suite:
    name: Run ${{ matrix.suite }} tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - '20'
          - '22'
          - '24'
        suite:
          - core
          - tools
          - components
          - screens
          - hooks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm ${{ matrix.suite }} tests
        run: npm run test:${{ matrix.suite }}
